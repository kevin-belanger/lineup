services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: lineup-app:latest
        restart: unless-stopped
        env_file:
            - .env
        expose:
            - "80"
        volumes:
            - laravel-storage:/var/www/html/storage
        networks:
            - lineup
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    scheduler:
        image: lineup-app:latest
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        env_file:
            - .env
        command: php artisan schedule:work
        volumes:
            - laravel-storage:/var/www/html/storage
        networks:
            - lineup
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    caddy:
        image: caddy:alpine
        restart: unless-stopped
        ports:
            - '${HTTP_PORT:-80}:80'
            - '${HTTPS_PORT:-443}:443'
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy-data:/data
            - caddy-config:/config
        networks:
            - lineup
        depends_on:
            - app

    mysql:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - mysql:/var/lib/mysql
        networks:
            - lineup
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s

    redis:
        image: redis:alpine
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - redis:/data
        networks:
            - lineup
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

networks:
    lineup:
        driver: bridge

volumes:
    mysql:
        driver: local
    redis:
        driver: local
    caddy-data:
        driver: local
    caddy-config:
        driver: local
    laravel-storage:
        driver: local
